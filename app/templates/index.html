<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontology Evaluation System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }

  .header { background: #1a1a2e; color: #fff; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .header .badge { font-size: 11px; background: #16213e; border: 1px solid #0f3460; color: #e94560; padding: 3px 8px; border-radius: 4px; }

  .main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

  .upload-section { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
  .upload-section h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: #333; }

  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .upload-box { border: 1.5px dashed #d0d0d0; border-radius: 8px; padding: 1.25rem; text-align: center; cursor: pointer; transition: all .15s; position: relative; background: #fafafa; }
  .upload-box:hover { border-color: #888; background: #f0f0f0; }
  .upload-box.has-file { border-style: solid; border-color: #16a34a; background: #f0fdf4; }
  .upload-box input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-box .icon { font-size: 28px; margin-bottom: 8px; }
  .upload-box .label { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 4px; }
  .upload-box .sub { font-size: 11px; color: #888; }
  .upload-box .fname { font-size: 12px; color: #16a34a; font-weight: 500; margin-top: 6px; word-break: break-all; }

  .run-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 500; border-radius: 8px; border: none; background: #1a1a2e; color: #fff; cursor: pointer; transition: background .15s; }
  .run-btn:hover:not(:disabled) { background: #16213e; }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; }
  .results.show { display: block; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: #fff; border-radius: 8px; border: 1px solid #e5e5e5; padding: 1rem; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 500; }
  .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
  .stat-card.critical .stat-val { color: #dc2626; }
  .stat-card.important .stat-val { color: #d97706; }
  .stat-card.minor .stat-val { color: #6b7280; }

  .pitfall-section { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 1.5rem; }
  .pitfall-section h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: #333; }

  .pitfall-list { display: flex; flex-direction: column; gap: 10px; }
  .pitfall-item { border: 1px solid #e5e5e5; border-radius: 8px; padding: 12px 14px; }
  .pitfall-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
  .badge.critical { background: #fee2e2; color: #dc2626; }
  .badge.important { background: #fef3c7; color: #d97706; }
  .badge.minor { background: #f3f4f6; color: #6b7280; }
  .pitfall-code { font-size: 12px; font-family: monospace; color: #888; }
  .pitfall-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .pitfall-desc { font-size: 12px; color: #666; line-height: 1.6; }
  .pitfall-affected { font-size: 11px; color: #888; margin-top: 4px; }

  .empty-state { text-align: center; padding: 2.5rem; color: #888; }
  .empty-state .icon { font-size: 36px; display: block; margin-bottom: 10px; }

  .error-box { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 12px 14px; color: #dc2626; font-size: 13px; margin-bottom: 1rem; }

  .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 14px; color: #1d4ed8; font-size: 12px; margin-bottom: 1rem; }

  .no-pitfall { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 1.5rem; text-align: center; color: #16a34a; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>Ontology Evaluation System</h1>
  <span class="badge">OOPS! + KNUT</span>
</div>

<div class="main">
  <div class="upload-section">
    <h2>파일 업로드</h2>
    <div class="upload-grid">
      <div class="upload-box" id="zone-onto">
        <input type="file" id="input-onto" accept=".owl,.rdf,.ttl,.json,.jsonld,.n3,.nt,.xml">
        <div class="icon">🧩</div>
        <div class="label">온톨로지 파일</div>
        <div class="sub">.owl .rdf .ttl .json .jsonld .n3 .nt .xml</div>
        <div class="fname" id="fname-onto"></div>
      </div>
      <div class="upload-box" id="zone-pdf">
        <input type="file" id="input-pdf" accept=".pdf">
        <div class="icon">📄</div>
        <div class="label">PDF 원본 <span style="font-weight:400;color:#aaa">(선택)</span></div>
        <div class="sub">.pdf — 향후 커버리지 분석에 사용</div>
        <div class="fname" id="fname-pdf"></div>
      </div>
    </div>
    <button class="run-btn" id="run-btn" disabled>평가 실행</button>
  </div>

  <div class="results" id="results">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="pitfall-section">
      <h2>OOPS! 검사 결과</h2>
      <div id="pitfall-body"></div>
    </div>
  </div>
</div>

<script>
const ontoInput = document.getElementById('input-onto');
const pdfInput = document.getElementById('input-pdf');
const runBtn = document.getElementById('run-btn');

function setupZone(input, zoneId, fnameId) {
  input.addEventListener('change', () => {
    const f = input.files[0];
    if (!f) return;
    document.getElementById(fnameId).textContent = f.name;
    document.getElementById(zoneId).classList.add('has-file');
    if (input === ontoInput) runBtn.disabled = false;
  });
}

setupZone(ontoInput, 'zone-onto', 'fname-onto');
setupZone(pdfInput, 'zone-pdf', 'fname-pdf');

runBtn.addEventListener('click', async () => {
  if (!ontoInput.files[0]) return;

  runBtn.disabled = true;
  runBtn.innerHTML = '<span class="spinner"></span>평가 중...';
  document.getElementById('results').classList.remove('show');

  const fd = new FormData();
  fd.append('ontology', ontoInput.files[0]);
  if (pdfInput.files[0]) fd.append('pdf', pdfInput.files[0]);

  try {
    const res = await fetch('/evaluate', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.error) {
      document.getElementById('results').classList.add('show');
      document.getElementById('stats-grid').innerHTML = '';
      document.getElementById('pitfall-body').innerHTML =
        `<div class="error-box">❌ ${data.error}</div>`;
      return;
    }

    renderStats(data.stats);
    renderPitfalls(data.pitfalls, data.oops_error, data.filename, data.format);
    document.getElementById('results').classList.add('show');

  } catch(e) {
    alert('요청 실패: ' + e.message);
  } finally {
    runBtn.disabled = false;
    runBtn.innerHTML = '평가 실행';
  }
});

function renderStats(s) {
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${s.total}</div>
      <div class="stat-label">전체 pitfall</div>
    </div>
    <div class="stat-card critical">
      <div class="stat-val">${s.critical}</div>
      <div class="stat-label">Critical</div>
    </div>
    <div class="stat-card important">
      <div class="stat-val">${s.important}</div>
      <div class="stat-label">Important</div>
    </div>
    <div class="stat-card minor">
      <div class="stat-val">${s.minor}</div>
      <div class="stat-label">Minor</div>
    </div>
  `;
}

function renderPitfalls(pitfalls, oopsError, filename, fmt) {
  let html = '';

  html += `<div class="info-box">파일: <strong>${filename}</strong> — 포맷: <strong>${fmt}</strong>으로 변환 후 OOPS! 검사 완료</div>`;

  if (oopsError) {
    html += `<div class="error-box">⚠️ OOPS! 오류: ${oopsError}</div>`;
  }

  if (!pitfalls || pitfalls.length === 0) {
    html += `<div class="no-pitfall">✅ Pitfall이 감지되지 않았습니다!</div>`;
  } else {
    html += '<div class="pitfall-list">';
    for (const p of pitfalls) {
      const imp = (p.importance || 'MINOR').toLowerCase();
      html += `
        <div class="pitfall-item">
          <div class="pitfall-header">
            <span class="badge ${imp}">${p.importance || 'MINOR'}</span>
            <span class="pitfall-code">${p.code || ''}</span>
          </div>
          <div class="pitfall-name">${p.name || ''}</div>
          ${p.description ? `<div class="pitfall-desc">${p.description}</div>` : ''}
          ${p.affected !== undefined ? `<div class="pitfall-affected">영향 받는 요소: ${p.affected}개</div>` : ''}
        </div>`;
    }
    html += '</div>';
  }

  document.getElementById('pitfall-body').innerHTML = html;
}
</script>
</body>
</html>
